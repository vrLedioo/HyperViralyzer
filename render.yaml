# Render Blueprint for the VidAnalyzer backend + managed Postgres.
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.
# Secret values (sync:false) are entered in the Render dashboard after creation.
services:
  - type: web
    name: vidanalyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    plan: starter   # 'free' also works; starter avoids cold-start sleeps
    envVars:
      - key: APP_ENV
        value: production
      - key: TRANSCRIPTION_PROVIDER
        value: openai          # cloud Whisper (no local faster-whisper in prod)
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret (satisfies prod guard)
      - key: DATABASE_URL
        fromDatabase:
          name: vidanalyzer-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false            # set in dashboard
      # --- Payments: Lemon Squeezy (works in Kosovo). Set these in the dashboard. ---
      - key: PAYMENT_PROVIDER
        value: lemonsqueezy
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_SUBSCRIPTION_VARIANT_ID
        sync: false
      - key: LEMONSQUEEZY_CREDITS_VARIANT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false            # your Vercel URL, e.g. https://vidanalyzer.vercel.app

databases:
  - name: vidanalyzer-db
    plan: free
