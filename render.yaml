# Render Blueprint for the Hyperyzer backend + managed Postgres.
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.
# Secret values (sync:false) are entered in the Render dashboard after creation.
services:
  - type: web
    name: hyperyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    plan: starter   # 'free' also works; starter avoids cold-start sleeps
    envVars:
      - key: APP_ENV
        value: production
      - key: TRANSCRIPTION_PROVIDER
        value: openai          # cloud Whisper (no local faster-whisper in prod)
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret (satisfies prod guard)
      - key: DATABASE_URL
        fromDatabase:
          name: hyperyzer-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false            # set in dashboard
      # --- Payments: Lemon Squeezy (works in Kosovo). Set these in the dashboard. ---
      - key: PAYMENT_PROVIDER
        value: lemonsqueezy
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      # One variant id per subscription plan (create in the LS dashboard):
      - key: LS_VARIANT_CREATOR
        sync: false            # Creator €14/mo
      - key: LS_VARIANT_PRO
        sync: false            # Pro €29/mo
      - key: LS_VARIANT_AGENCY
        sync: false            # Agency €79/mo
      # One variant id per one-time credit pack:
      - key: LS_VARIANT_PACK_SMALL
        sync: false            # 50 credits / €9
      - key: LS_VARIANT_PACK_LARGE
        sync: false            # 200 credits / €29
      - key: FRONTEND_URL
        sync: false            # your Vercel URL, e.g. https://hyperyzer.vercel.app

databases:
  - name: hyperyzer-db
    plan: free
